<!DOCTYPE html>
<html lang="it">
<head>
    <link rel="icon" type="image/png" href="../static/images/LogoNoBG.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calendario degli eventi della Collaborazione Pastorale di San Giorgio di Nogaro: messe, incontri e attività della comunità.">
    <title>Eventi - Collaborazione Pastorale San Giorgio di Nogaro</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="canonical" href="https://www.cpsangiorgio.it/pages/eventi.html">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B2QXHE6MQX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B2QXHE6MQX');
    </script>
    <style>
        /* ─── Variables ─────────────────────────────────────── */
        :root {
            --blue:      #1a365d;
            --red:       #e53e3e;
            --red-light: #fff5f5;
            --red-mid:   #fed7d7;
            --cont:      #2563eb;
            --cont-light:#eff6ff;
            --cont-mid:  #bfdbfe;
            --gray-50:   #f8fafc;
            --gray-100:  #f1f5f9;
            --gray-200:  #e2e8f0;
            --gray-400:  #94a3b8;
            --gray-600:  #475569;
            --gray-800:  #1e293b;
        }

        /* ─── Page wrapper ───────────────────────────────────── */
        .events-page {
            padding: 1.5rem 2rem 4rem;
            max-width: 1060px;
            margin: 0 auto;
        }

        /* ─── Calendar card ──────────────────────────────────── */
        .cal-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.07);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        /* Header */
        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .cal-nav-group {
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .cal-nav-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: #fff;
            color: var(--gray-600);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .8rem;
            transition: background .15s, border-color .15s;
        }

        .cal-nav-btn:hover {
            background: var(--gray-100);
            border-color: var(--gray-400);
        }

        .cal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            min-width: 190px;
            text-align: center;
        }

        .cal-today-btn {
            font-size: .78rem;
            font-weight: 600;
            padding: .35rem .85rem;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: #fff;
            color: var(--gray-600);
            cursor: pointer;
            transition: background .15s;
        }

        .cal-today-btn:hover {
            background: var(--gray-100);
        }

        /* Weekday labels */
        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .cal-weekday {
            padding: .55rem .5rem .45rem;
            text-align: center;
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--gray-400);
        }

        /* Grid */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cal-cell {
            min-width: 0;
            min-height: 96px;
            padding: .5rem .45rem .4rem;
            border-right: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: .3rem;
            transition: background .12s;
            position: relative;
        }

        .cal-cell:nth-child(7n) { border-right: none; }

        .cal-cell:hover { background: var(--gray-50); }

        .cal-cell.other-month { background: var(--gray-50); }
        .cal-cell.other-month .cal-day-num { color: var(--gray-400); }

        .cal-cell.selected {
            background: #eff6ff;
        }
        .cal-cell.selected .cal-day-num {
            background: var(--blue);
            color: #fff;
        }

        /* Day number */
        .cal-day-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .82rem;
            font-weight: 600;
            color: var(--gray-800);
            flex-shrink: 0;
            align-self: flex-end;  /* right-align via flex row trick */
            margin-left: auto;
        }

        .cal-cell.today .cal-day-num {
            background: var(--red);
            color: #fff;
        }

        /* Event pills inside cells */
        .cal-pills {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
        }

        .cal-pill {
            font-size: .68rem;
            font-weight: 600;
            padding: .18rem .45rem;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .cal-pill.single {
            background: var(--red-light);
            color: var(--red);
            border-left: 3px solid var(--red);
        }

        .cal-pill.continuous {
            background: var(--cont-light);
            color: var(--cont);
            border-left: 3px solid var(--cont);
        }

        .cal-pill.more {
            background: var(--gray-100);
            color: var(--gray-600);
            border-left: 3px solid var(--gray-400);
        }

        /* ─── Events list ─────────────────────────────────────── */
        .events-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .events-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .75rem;
        }

        .events-section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--blue);
        }

        .events-section-title span {
            font-weight: 400;
            color: var(--gray-600);
        }

        .back-btn {
            font-size: .8rem;
            font-weight: 600;
            padding: .35rem .85rem;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: #fff;
            color: var(--gray-600);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: .4rem;
            transition: background .15s;
        }

        .back-btn:hidden { display: none; }
        .back-btn:hover { background: var(--gray-100); }

        /* Event card */
        .ev-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.05);
            display: flex;
            overflow: hidden;
            transition: box-shadow .2s, transform .15s;
        }

        .ev-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,.1);
            transform: translateY(-1px);
        }

        /* Coloured date block */
        .ev-date {
            width: 68px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.1rem .5rem;
            gap: .15rem;
        }

        .ev-card.single  .ev-date { background: var(--red);  color: #fff; }
        .ev-card.continuous .ev-date { background: var(--cont); color: #fff; }

        .ev-date-day {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1;
        }

        .ev-date-month {
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            opacity: .85;
        }

        /* Card body */
        .ev-body {
            padding: .9rem 1.1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .ev-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: .75rem;
            flex-wrap: wrap;
        }

        .ev-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--gray-800);
            line-height: 1.3;
        }

        .ev-badge {
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .07em;
            text-transform: uppercase;
            padding: .2rem .55rem;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ev-badge.single     { background: var(--red-light);  color: var(--red); }
        .ev-badge.continuous { background: var(--cont-light); color: var(--cont); }

        /* Meta row */
        .ev-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem 1.25rem;
        }

        .ev-meta-item {
            display: flex;
            align-items: center;
            gap: .4rem;
            font-size: .82rem;
            color: var(--gray-600);
        }

        .ev-meta-item i {
            font-size: .78rem;
            width: 14px;
            text-align: center;
            color: var(--gray-400);
            flex-shrink: 0;
        }

        /* Continuous date range */
        .ev-range {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .82rem;
            color: var(--gray-600);
            flex-wrap: wrap;
        }

        .ev-range i { color: var(--gray-400); font-size: .78rem; }

        .ev-range-sep {
            color: var(--gray-400);
            font-size: .75rem;
        }

        /* Description */
        .ev-desc {
            font-size: .83rem;
            color: var(--gray-600);
            line-height: 1.5;
            border-top: 1px solid var(--gray-200);
            padding-top: .5rem;
        }

        /* Day counter for continuous */
        .ev-day-counter {
            font-size: .75rem;
            font-weight: 600;
            color: var(--cont);
            display: flex;
            align-items: center;
            gap: .35rem;
        }

        /* ─── View toggle ────────────────────────────────────── */
        .view-toggle {
            display: flex;
            gap: 0;
            background: var(--gray-100);
            border-radius: 10px;
            padding: 3px;
            margin-bottom: 1.25rem;
            width: fit-content;
        }

        .toggle-btn {
            display: flex;
            align-items: center;
            gap: .45rem;
            font-size: .82rem;
            font-weight: 600;
            padding: .45rem 1rem;
            border-radius: 7px;
            border: none;
            background: transparent;
            color: var(--gray-600);
            cursor: pointer;
            transition: background .15s, color .15s, box-shadow .15s;
        }

        .toggle-btn.active {
            background: #fff;
            color: var(--blue);
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
        }

        .toggle-btn i { font-size: .78rem; }

        /* ─── List view date separator ───────────────────────── */
        .list-day-group { display: flex; flex-direction: column; gap: .75rem; }

        .list-day-header {
            display: flex;
            align-items: center;
            gap: .75rem;
            margin-top: .5rem;
        }

        .list-day-label {
            font-size: .78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .07em;
            color: var(--gray-400);
            white-space: nowrap;
        }

        .list-day-label.today-label { color: var(--red); }

        .list-day-line {
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }

        /* ─── Empty state ─────────────────────────────────────── */
        .no-events {
            background: #fff;
            border-radius: 12px;
            padding: 3rem 2rem;
            text-align: center;
            color: var(--gray-400);
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }

        .no-events i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: .75rem;
            opacity: .4;
        }

        .no-events p {
            font-size: .9rem;
            margin: 0;
        }

        /* ─── Responsive ──────────────────────────────────────── */
        @media (max-width: 700px) {
            .events-page { padding: 1rem 1rem 3rem; }

            .cal-cell {
                min-height: 52px;
                padding: .35rem .25rem .3rem;
                gap: .2rem;
            }

            .cal-day-num {
                width: 22px;
                height: 22px;
                font-size: .72rem;
            }

            /* Hide pills on mobile, show dots instead */
            .cal-pills { display: none; }

            .cal-cell.has-events::after,
            .cal-cell.has-continuous::after,
            .cal-cell.has-mixed::after {
                content: '';
                position: absolute;
                bottom: 5px;
                left: 50%;
                transform: translateX(-50%);
                width: 5px;
                height: 5px;
                border-radius: 50%;
                background: var(--red);
            }

            .cal-cell.has-continuous::after { background: var(--cont); }
            .cal-cell.has-mixed::after {
                width: 10px;
                background: linear-gradient(90deg, var(--red) 50%, var(--cont) 50%);
                border-radius: 3px;
            }

            .cal-title { font-size: 1rem; min-width: 140px; }
            .cal-today-btn { display: none; }

            .ev-date { width: 56px; }
            .ev-date-day { font-size: 1.4rem; }
        }

        @media (max-width: 400px) {
            .cal-cell { min-height: 40px; }
            .cal-weekday { font-size: .6rem; letter-spacing: .04em; }
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>

    <main class="main-wrapper">
        <div class="hero">
            <h1><i class="fas fa-calendar-alt"></i> Eventi</h1>
            <p>Scopri i nostri eventi programmati</p>
        </div>

        <div class="events-page">

            <!-- ── View toggle ── -->
            <div class="view-toggle">
                <button class="toggle-btn active" id="view-cal">
                    <i class="fas fa-calendar-alt"></i> Calendario
                </button>
                <button class="toggle-btn" id="view-list">
                    <i class="fas fa-list"></i> Lista
                </button>
            </div>

            <!-- ── Calendar ── -->
            <div class="cal-card" id="cal-card">
                <div class="cal-header">
                    <div class="cal-nav-group">
                        <button class="cal-nav-btn" id="prev-month" aria-label="Mese precedente">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button class="cal-nav-btn" id="next-month" aria-label="Mese successivo">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                    <div class="cal-title" id="calendar-title">Caricamento…</div>
                    <button class="cal-today-btn" id="today-btn">Oggi</button>
                </div>

                <div class="cal-weekdays">
                    <div class="cal-weekday">Dom</div>
                    <div class="cal-weekday">Lun</div>
                    <div class="cal-weekday">Mar</div>
                    <div class="cal-weekday">Mer</div>
                    <div class="cal-weekday">Gio</div>
                    <div class="cal-weekday">Ven</div>
                    <div class="cal-weekday">Sab</div>
                </div>

                <div class="cal-grid" id="calendar-days"></div>
            </div>

            <!-- ── Events list ── -->
            <div class="events-section">
                <div class="events-section-header">
                    <div class="events-section-title" id="sidebar-title">
                        Eventi del mese
                    </div>
                    <button class="back-btn" id="back-btn" style="display:none">
                        <i class="fas fa-arrow-left"></i> Tutti gli eventi del mese
                    </button>
                </div>
                <div id="events-list"></div>
            </div>

        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../static/js/components.js"></script>

    <script>
        const MONTH_NAMES = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno',
                             'Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
        const MONTH_SHORT = ['Gen','Feb','Mar','Apr','Mag','Giu',
                             'Lug','Ago','Set','Ott','Nov','Dic'];

        let currentDate = new Date();
        let events = [];
        let selectedDay = null;   // null = month view
        let viewMode = 'calendar'; // 'calendar' | 'list'

        /* ── Data loading ───────────────────────── */
        async function loadEvents() {
            try {
                const res = await fetch('../api/events.php');
                const data = await res.json();
                events = data.map(e => ({ ...e, date: new Date(e.date) }));
                render();
            } catch (err) {
                console.error('Errore nel caricamento eventi:', err);
            }
        }

        /* ── Master render ──────────────────────── */
        function render() {
            const calCard = document.getElementById('cal-card');
            const evSection = document.querySelector('.events-section');

            if (viewMode === 'list') {
                calCard.style.display = 'none';
                evSection.style.display = 'flex';
                selectedDay = null;
                document.getElementById('back-btn').style.display = 'none';
                renderListView();
            } else {
                calCard.style.display = '';
                evSection.style.display = 'flex';
                renderCalendar();
                renderEventList();
            }
        }

        /* ── Calendar ───────────────────────────── */
        function renderCalendar() {
            const title = document.getElementById('calendar-title');
            const grid  = document.getElementById('calendar-days');

            title.textContent = `${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            grid.innerHTML = '';

            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const start    = new Date(firstDay);
            start.setDate(start.getDate() - firstDay.getDay());

            const today = new Date();

            for (let i = 0; i < 42; i++) {
                const day = new Date(start);
                day.setDate(start.getDate() + i);

                const isOther   = day.getMonth() !== currentDate.getMonth();
                const isToday   = sameDay(day, today);
                const isSelected = selectedDay && sameDay(day, selectedDay);

                // Events on this day
                const dayEvents = getEventsForDay(day);
                const hasSingle = dayEvents.some(e => e.event_type === 'single');
                const hasCont   = dayEvents.some(e => e.event_type === 'continuous');

                const cell = document.createElement('div');
                cell.className = 'cal-cell'
                    + (isOther    ? ' other-month' : '')
                    + (isToday    ? ' today'       : '')
                    + (isSelected ? ' selected'    : '');

                if (dayEvents.length > 0) {
                    if (hasSingle && hasCont)  cell.classList.add('has-mixed');
                    else if (hasCont)           cell.classList.add('has-continuous');
                    else                        cell.classList.add('has-events');
                }

                // Day number
                const num = document.createElement('div');
                num.className = 'cal-day-num';
                num.textContent = day.getDate();
                cell.appendChild(num);

                // Event pills (hidden on mobile via CSS)
                if (dayEvents.length > 0) {
                    const pills = document.createElement('div');
                    pills.className = 'cal-pills';

                    const show = dayEvents.slice(0, 2);
                    const rest = dayEvents.length - show.length;

                    show.forEach(ev => {
                        const p = document.createElement('div');
                        p.className = `cal-pill ${ev.event_type}`;
                        p.textContent = ev.title;
                        pills.appendChild(p);
                    });

                    if (rest > 0) {
                        const more = document.createElement('div');
                        more.className = 'cal-pill more';
                        more.textContent = `+${rest} altri`;
                        pills.appendChild(more);
                    }

                    cell.appendChild(pills);
                }

                cell.addEventListener('click', () => selectDay(day, cell));
                grid.appendChild(cell);
            }
        }

        /* ── Day selection ──────────────────────── */
        function selectDay(day, cellEl) {
            // Deselect if same day clicked twice
            if (selectedDay && sameDay(day, selectedDay)) {
                selectedDay = null;
                document.getElementById('back-btn').style.display = 'none';
                render();
                return;
            }
            selectedDay = day;
            document.getElementById('back-btn').style.display = 'flex';

            // Update selected class without full re-render
            document.querySelectorAll('.cal-cell.selected').forEach(c => {
                c.classList.remove('selected');
                c.querySelector('.cal-day-num').style.background = '';
                c.querySelector('.cal-day-num').style.color = '';
            });
            cellEl.classList.add('selected');

            renderEventList();

            // Scroll to events section
            document.querySelector('.events-section')
                .scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        /* ── Event list ─────────────────────────── */
        function renderEventList() {
            const list  = document.getElementById('events-list');
            const title = document.getElementById('sidebar-title');
            list.innerHTML = '';

            let eventsToShow;

            if (selectedDay) {
                const dayName = selectedDay.toLocaleDateString('it-IT',
                    { weekday: 'long', day: 'numeric', month: 'long' });
                title.innerHTML = `<span>Eventi —</span> ${dayName}`;
                eventsToShow = getEventsForDay(selectedDay);
            } else {
                title.innerHTML = `<span>Tutti gli eventi —</span> ${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
                eventsToShow = events.filter(e =>
                    e.date.getMonth()    === currentDate.getMonth() &&
                    e.date.getFullYear() === currentDate.getFullYear()
                ).sort((a, b) => a.date - b.date);
            }

            if (eventsToShow.length === 0) {
                list.innerHTML = `
                    <div class="no-events">
                        <i class="fas fa-calendar-xmark"></i>
                        <p>Nessun evento ${selectedDay ? 'in questa data' : 'programmato per questo mese'}</p>
                    </div>`;
                return;
            }

            eventsToShow.forEach(ev => list.appendChild(buildEventCard(ev, selectedDay)));
        }

        /* ── Event card ─────────────────────────── */
        function buildEventCard(ev, contextDay) {
            const card = document.createElement('div');
            card.className = `ev-card ${ev.event_type}`;

            // Date block
            const dateBlock = document.createElement('div');
            dateBlock.className = 'ev-date';
            dateBlock.innerHTML = `
                <div class="ev-date-day">${ev.date.getDate()}</div>
                <div class="ev-date-month">${MONTH_SHORT[ev.date.getMonth()]}</div>`;
            card.appendChild(dateBlock);

            // Body
            const body = document.createElement('div');
            body.className = 'ev-body';

            // Title + badge
            const top = document.createElement('div');
            top.className = 'ev-top';
            top.innerHTML = `
                <div class="ev-title">${ev.title}</div>
                <div class="ev-badge ${ev.event_type}">${ev.event_type === 'continuous' ? 'Continuo' : 'Singolo'}</div>`;
            body.appendChild(top);

            // Meta
            const meta = document.createElement('div');
            meta.className = 'ev-meta';

            if (ev.event_type === 'continuous' && ev.end_date) {
                // Date range
                const range = document.createElement('div');
                range.className = 'ev-range';
                range.innerHTML = `
                    <i class="fas fa-calendar-range"></i>
                    ${ev.date.toLocaleDateString('it-IT')}${ev.time ? ' ' + ev.time : ''}
                    <span class="ev-range-sep">→</span>
                    ${new Date(ev.end_date).toLocaleDateString('it-IT')}${ev.end_time ? ' ' + ev.end_time : ''}`;
                meta.appendChild(range);

                // Day counter when a specific day is selected
                if (contextDay) {
                    const start  = normalise(ev.date);
                    const end    = normalise(new Date(ev.end_date));
                    const curr   = normalise(contextDay);
                    const total  = Math.round((end - start) / 86400000) + 1;
                    const dayNum = Math.round((curr - start) / 86400000) + 1;
                    const counter = document.createElement('div');
                    counter.className = 'ev-day-counter';
                    counter.innerHTML = `<i class="fas fa-layer-group"></i> Giorno ${dayNum} di ${total}`;
                    meta.appendChild(counter);
                }
            } else {
                // Single event time
                if (ev.time) {
                    const timeEl = document.createElement('div');
                    timeEl.className = 'ev-meta-item';
                    timeEl.innerHTML = `<i class="fas fa-clock"></i> ${ev.time}`;
                    meta.appendChild(timeEl);
                }
            }

            // Location
            if (ev.place) {
                const place = document.createElement('div');
                place.className = 'ev-meta-item';
                place.innerHTML = `<i class="fas fa-location-dot"></i> ${ev.place}`;
                meta.appendChild(place);
            }

            body.appendChild(meta);

            // Description
            if (ev.description) {
                const desc = document.createElement('div');
                desc.className = 'ev-desc';
                desc.textContent = ev.description;
                body.appendChild(desc);
            }

            card.appendChild(body);
            return card;
        }

        /* ── List view (grouped by day) ─────────── */
        function renderListView() {
            const list  = document.getElementById('events-list');
            const title = document.getElementById('sidebar-title');
            list.innerHTML = '';

            title.innerHTML = `<span>Tutti gli eventi —</span> ${MONTH_NAMES[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            const monthEvents = events.filter(e =>
                e.date.getMonth()    === currentDate.getMonth() &&
                e.date.getFullYear() === currentDate.getFullYear()
            ).sort((a, b) => a.date - b.date);

            if (monthEvents.length === 0) {
                list.innerHTML = `
                    <div class="no-events">
                        <i class="fas fa-calendar-xmark"></i>
                        <p>Nessun evento programmato per questo mese</p>
                    </div>`;
                return;
            }

            // Group by date string
            const groups = {};
            monthEvents.forEach(ev => {
                const key = ev.date.toDateString();
                if (!groups[key]) groups[key] = { date: ev.date, events: [] };
                groups[key].events.push(ev);
            });

            const today = new Date();
            Object.values(groups).forEach(({ date, events: dayEvs }) => {
                const isToday = sameDay(date, today);
                const dayLabel = date.toLocaleDateString('it-IT',
                    { weekday: 'long', day: 'numeric', month: 'long' });

                // Day separator
                const separator = document.createElement('div');
                separator.className = 'list-day-header';
                separator.innerHTML = `
                    <div class="list-day-label ${isToday ? 'today-label' : ''}">
                        ${isToday ? '● Oggi — ' : ''}${dayLabel}
                    </div>
                    <div class="list-day-line"></div>`;

                const group = document.createElement('div');
                group.className = 'list-day-group';
                group.appendChild(separator);

                dayEvs.forEach(ev => group.appendChild(buildEventCard(ev, null)));
                list.appendChild(group);
            });
        }

        /* ── Helpers ────────────────────────────── */
        function sameDay(a, b) {
            return a.getFullYear() === b.getFullYear() &&
                   a.getMonth()    === b.getMonth()    &&
                   a.getDate()     === b.getDate();
        }

        function normalise(d) {
            return new Date(d.getFullYear(), d.getMonth(), d.getDate());
        }

        function getEventsForDay(day) {
            return events.filter(ev => {
                if (ev.event_type === 'continuous' && ev.end_date) {
                    const s = normalise(ev.date);
                    const e = normalise(new Date(ev.end_date));
                    const d = normalise(day);
                    return d >= s && d <= e;
                }
                return sameDay(ev.date, day);
            });
        }

        /* ── Controls ───────────────────────────── */
        document.getElementById('prev-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            selectedDay = null;
            document.getElementById('back-btn').style.display = 'none';
            render();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            selectedDay = null;
            document.getElementById('back-btn').style.display = 'none';
            render();
        });

        document.getElementById('today-btn').addEventListener('click', () => {
            currentDate = new Date();
            selectedDay = null;
            document.getElementById('back-btn').style.display = 'none';
            render();
        });

        document.getElementById('back-btn').addEventListener('click', () => {
            selectedDay = null;
            document.getElementById('back-btn').style.display = 'none';
            render();
        });

        document.getElementById('view-cal').addEventListener('click', () => {
            viewMode = 'calendar';
            document.getElementById('view-cal').classList.add('active');
            document.getElementById('view-list').classList.remove('active');
            render();
        });

        document.getElementById('view-list').addEventListener('click', () => {
            viewMode = 'list';
            document.getElementById('view-list').classList.add('active');
            document.getElementById('view-cal').classList.remove('active');
            render();
        });

        window.onload = loadEvents;
    </script>
</body>
</html>
